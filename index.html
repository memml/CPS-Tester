<!DOCTYPE html>
<html>
    <head>
        <title>CPS Tester</title>

        <style>
            @keyframes breathe {
                0%   { transform: scale(1); }
                50%  { transform: scale(1.075); }
                100% { transform: scale(1); }
            }

            @keyframes click {
                0%   { transform: rotate(-5deg); }
                50%   { transform: rotate(5deg) scale(1.075); }
                100% { transform: rotate(0deg); }
            }

            body {
                font-family: Arial, sans-serif;
                margin: 0;
                background-color: #202020;
                display: flex;
                align-items: center;
                flex-direction: column;
            }

            #click-area {
                width: 300px;
                height: 300px;
                padding: 20px;
                border-radius: 15px;
                border: none;
                cursor: pointer;
                box-shadow: 0 5px 15px rgba(0,0,0,0.4);
                margin: 30px auto 20px auto;
                background-color: #252525;
                animation: breathe 3s ease-in-out infinite;
            }

            #counter {
                color: white;
                text-align: center;
                font-size: 30px;
                width: 300px;
                padding: 20px;
                border-radius: 15px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.4);
                margin: 30px auto 20px auto;
                background-color: #303030;
            }

            #click-area {
                animation: click 0.25s ease-out forwards;
            }
        </style>
    </head>

    <body>
        <button id="click-area" onclick="onClick()"></button>
        <div id="counter">0</div>

        <script src="index.js"></script>
    </body>
</html>
